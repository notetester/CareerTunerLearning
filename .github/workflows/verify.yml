name: Verify learning docs

on:
  pull_request:
  push:
    branches-ignore: [main]

permissions:
  contents: read

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Reject stale claims
        run: npm run docs:check:stale

      - name: Build and verify links
        run: npm run docs:build
